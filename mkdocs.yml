site_name: Lodestar
site_description: The trust layer for AI agents.
site_url: https://qmilab.com/lodestar/docs/
repo_url: https://github.com/qmilab/lodestar
repo_name: qmilab/lodestar
docs_dir: docs

theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    scheme: default

extra_css:
  - assets/qmilab-theme.css
  - https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.min.js
  - assets/asciinema-init.js

# Public docs site = reader-facing only. Planning/reference and the not-yet-written
# series placeholders stay out of the build (flip these as parts ship / if you want
# architecture+roadmap public).
exclude_docs: |
  internal/
  strategy/
  architecture/
  roadmap.md
  guides/part-2-the-threat-model.md
  guides/part-3-wrap-your-own-agent.md

nav:
  - Home: index.md
  - Get started: guides/get-started.md
  - Walkthrough: guides/walkthrough.md
  - Use cases: use-cases.md
  - Concepts:
      - The epistemic chain: concepts/epistemic-chain.md
      - Reading isn't believing: concepts/reading-isnt-believing.md
      - The memory firewall: concepts/memory-firewall.md
      - The trust ladder: concepts/trust-ladder.md
      - "The Policy Kernel & approvals": concepts/policy-kernel.md
      - "Governed egress & native adapters": concepts/governed-egress.md
      - Sentinels and calibration: concepts/sentinels-and-calibration.md
      - Memory poisoning: concepts/threat-model/memory-poisoning.md
  - Reference:
      - Architecture: reference/architecture.md
      - CLI: reference/cli.md
      - Probe packs: reference/probe-packs.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
