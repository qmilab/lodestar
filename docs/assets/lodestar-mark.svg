<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Lodestar">
  <!-- The lodestar: a guiding star / compass rose. White, for the navy header. -->
  <!-- diagonal (secondary) points -->
  <path fill="#FFFFFF" opacity="0.65"
        d="M72.6 27.4 L58 50 L72.6 72.6 L50 58 L27.4 72.6 L42 50 L27.4 27.4 L50 42 Z"/>
  <!-- main four points -->
  <path fill="#FFFFFF"
        d="M50 2 L57.5 42.5 L98 50 L57.5 57.5 L50 98 L42.5 57.5 L2 50 L42.5 42.5 Z"/>
  <!-- center -->
  <circle cx="50" cy="50" r="5.5" fill="#1B2A4A"/>
  <circle cx="50" cy="50" r="3.2" fill="#FFFFFF"/>
</svg>
