name: CLA

# Contributor License Agreement gate.
#
# This uses the self-hosted CLA Assistant GitHub Action
# (contributor-assistant/github-action) — no third-party SaaS app and no
# data leaves GitHub. On every pull request it checks whether each commit
# author has signed the CLA; if not, the bot comments asking them to sign
# by replying with the agreement phrase. Signatures are recorded in a JSON
# file (see `path-to-signatures` below).
#
# ─────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (maintainer — must be done before this gate works):
#
#   1. Decide where signatures are stored. By default they go to a
#      `signatures/` file on a dedicated branch of THIS repo. To keep them
#      out of the main tree, create an empty branch once:
#
#        git switch --orphan cla-signatures
#        git commit --allow-empty -m "init cla signatures"
#        git push origin cla-signatures
#
#      (Or store them in a separate private repo — uncomment
#      `remote-organization-name` / `remote-repository-name` below.)
#
#   2. Create a Personal Access Token (classic, scope: `repo`, or a
#      fine-grained token with Contents read/write on the signatures repo)
#      and add it as the repository secret `CLA_SIGNATURES_TOKEN`.
#      A plain GITHUB_TOKEN cannot push to the signatures branch/repo, so
#      this secret is required.
#
#   3. That's it — no app install on github.com is strictly required for
#      this action variant. (If you prefer the hosted cla-assistant.io app
#      instead, install it from the GitHub Marketplace, point it at the
#      `legal/CLA-individual.md` document, and you can delete this file.)
# ─────────────────────────────────────────────────────────────────────────

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # Skip until the maintainer has created the CLA_SIGNATURES_TOKEN secret
    # (see ONE-TIME SETUP above). This keeps the workflow from failing red
    # on every PR before it is wired up.
    if: ${{ vars.CLA_ENABLED == 'true' }}
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to the signatures branch/repo (see setup).
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          # Phrase a contributor comments on the PR to sign.
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge it, please
            sign the [Lodestar Contributor License Agreement](https://github.com/qmilab/lodestar/blob/main/legal/CLA-individual.md).
            You only need to do this once. To sign, post a new comment on
            this pull request with exactly the text below.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: >-
            All contributors have signed the CLA. ✍️ ✅

          # Where the signed-contributor record lives.
          path-to-signatures: 'signatures/cla.json'
          branch: 'cla-signatures'

          # The document contributors are agreeing to.
          path-to-document: 'https://github.com/qmilab/lodestar/blob/main/legal/CLA-individual.md'

          # Accounts that never need to sign: bots, and the maintainer —
          # as the licensor/copyright holder, Nandan does not sign a CLA
          # granting rights to himself. `claude` is the AI co-author that
          # rides commits via the `Co-Authored-By` trailer; like the other
          # bots it is a tool, not a rights-granting contributor, so it is
          # allowlisted rather than required to sign.
          allowlist: 'nandanito,claude,dependabot[bot],github-actions[bot]'

          # To store signatures in a SEPARATE repo instead of a branch of
          # this one, uncomment and point at it (the PAT needs write there):
          # remote-organization-name: 'qmilab'
          # remote-repository-name: 'lodestar-cla-signatures'
