name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for trusted publishing OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production   # matches the trusted-publisher config on npm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Run probes
        run: bun run probes:ci

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # `npm stage publish` was added in npm 11. Node 22 ships with
      # npm 10.x by default. The trusted-publisher rule on npm requires
      # `npm stage publish` (not `npm publish`), so we upgrade to npm
      # latest before publishing.
      - name: Upgrade npm (for stage publish)
        run: |
          npm install -g npm@latest
          npm --version

      # Derive the version from the tag (refs/tags/v0.2.0 -> 0.2.0) and
      # verify every publishable package already declares that version.
      # Failing here keeps a half-published release from happening — the
      # workflow won't push *any* package to npm if the versions are not
      # all aligned with the tag.
      - name: Verify package versions match the release tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          echo "Release tag implies version: $tag"
          mismatched=0
          while IFS= read -r pkg; do
            v=$(node -p "require('./$pkg').version")
            name=$(node -p "require('./$pkg').name")
            private=$(node -p "require('./$pkg').private === true")
            if [ "$private" = "true" ]; then
              continue
            fi
            if [ "$v" != "$tag" ]; then
              echo "::error::$name is at version $v but the tag is v$tag"
              mismatched=$((mismatched + 1))
            else
              echo "ok: $name @ $v"
            fi
          done < <(find packages -name package.json -not -path '*/node_modules/*' -not -path '*/dist/*')
          if [ "$mismatched" -gt 0 ]; then
            echo "::error::$mismatched package(s) out of sync with the tag — aborting before any publish"
            exit 1
          fi

      # Rewrite Bun's `workspace:*` protocol to exact semver pins
      # before publish. npm doesn't auto-rewrite `workspace:*`; a tarball
      # that ships with the literal string in its dependencies is
      # uninstallable by external consumers.
      #
      # Exact pins (`0.1.0`, not `^0.1.0`) intentionally — lockstep
      # monorepo releases mean version N of guard was tested against
      # version N of every internal dep, and we don't want install-time
      # drift to a patch that wasn't part of that lockstep.
      #
      # The rewrite happens in the CI runner only; committed source
      # keeps `workspace:*` so Bun-driven dev keeps working.
      - name: "Rewrite workspace:* to exact version pins"
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          while IFS= read -r pkg; do
            PKG="$pkg" VERSION="$version" node -e '
              const fs = require("fs");
              const path = process.env.PKG;
              const ver = process.env.VERSION;
              const p = JSON.parse(fs.readFileSync(path, "utf8"));
              let touched = false;
              for (const block of ["dependencies", "peerDependencies", "optionalDependencies"]) {
                if (!p[block]) continue;
                for (const k of Object.keys(p[block])) {
                  if (p[block][k] === "workspace:*" && k.startsWith("@qmilab/lodestar-")) {
                    p[block][k] = ver;
                    touched = true;
                  }
                }
              }
              if (touched) {
                fs.writeFileSync(path, JSON.stringify(p, null, 2) + "\n");
                console.log("rewrote workspace:* in " + path);
              }
            '
          done < <(find packages -name package.json -not -path '*/node_modules/*' -not -path '*/dist/*')

      # Belt-and-braces guard: fail the build if any `workspace:` string
      # remains in any non-private package.json. Catches future drift
      # to `workspace:^`, `workspace:~`, `workspace:0.1.0`, or any other
      # variant the rewrite loop above doesn't handle.
      - name: "Verify no workspace: strings remain"
        run: |
          set -euo pipefail
          leftover=$(find packages -name package.json -not -path '*/node_modules/*' -not -path '*/dist/*' \
            -exec grep -l '"workspace:' {} + || true)
          if [ -n "$leftover" ]; then
            echo "::error::workspace: protocol still present in published package.json after rewrite:"
            echo "$leftover"
            echo "$leftover" | xargs -I {} sh -c 'echo "--- {}"; grep -n "\"workspace:" "{}"'
            exit 1
          fi
          echo "ok: no workspace: strings remain in any package.json"

      # Verify the hardcoded PUBLISH_ORDER below is a valid topological
      # sort of the actual internal dependency graph. Runs AFTER the
      # workspace:* rewrite so it sees the exact-pin edges that
      # determine real installability of the published artifact.
      #
      # If someone adds a new internal dep (or a new package) but
      # forgets to update PUBLISH_ORDER, this fails the workflow
      # before any publish happens.
      - name: Verify publish order is topologically valid
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const order = [
            "packages/core",
            "packages/event-log",
            "packages/action-kernel",
            "packages/memory-firewall",
            "packages/cognitive-core",
            "packages/trace",
            "packages/adapters/filesystem",
            "packages/adapters/git",
            "packages/memory-firewall/adapters/mem0",
            "packages/memory-firewall/adapters/letta",
            "packages/memory-firewall/adapters/zep",
            // policy-kernel depends on core + action-kernel; `guard` depends
            // on it (re-exports the graduated autoApprovePolicy), so it
            // publishes before guard. Publishable since the Policy Kernel
            // marathon — it was simply never added to this order.
            "packages/policy-kernel",
            "packages/guard",
            // guard-mcp depends on core/event-log/action-kernel/
            // memory-firewall/cognitive-core/guard; lives after
            // `guard` and before `cli` (which now depends on it).
            // First-time publish needs the manual trusted-publisher
            // mini-marathon described in the Batch 3 release notes
            // before CI can stage-publish it through this path.
            "packages/guard-mcp",
            // harness depends on core + event-log; the CLI depends on it
            // (`lodestar harness run`/`list`), so it publishes before cli.
            "packages/harness",
            // viewer depends on core/event-log/trace; the CLI now depends
            // on it, so it publishes before `cli`. Like guard-mcp, its
            // first publish needs the manual trusted-publisher mini-marathon
            // before CI can stage-publish it through this path.
            "packages/viewer",
            "packages/cli",
          ];

          const published = new Set();
          const violations = [];

          for (const pkgDir of order) {
            const pj = JSON.parse(fs.readFileSync(path.join(pkgDir, "package.json"), "utf8"));
            const allDeps = {
              ...(pj.dependencies || {}),
              ...(pj.peerDependencies || {}),
              ...(pj.optionalDependencies || {}),
            };
            for (const depName of Object.keys(allDeps)) {
              if (depName.startsWith("@qmilab/lodestar-") && !published.has(depName)) {
                violations.push(pj.name + " depends on " + depName + " but " + depName + " has not been published yet in PUBLISH_ORDER");
              }
            }
            published.add(pj.name);
          }

          if (violations.length > 0) {
            console.error("::error::Publish order violations:");
            for (const v of violations) console.error("  - " + v);
            process.exit(1);
          }
          console.log("ok: publish order is topologically valid (" + order.length + " packages)");
          EOF

      # Publish in explicit topological order. The find-order loop used
      # earlier in this file's history relied on filesystem ordering,
      # which is not dependency-aware — under the exact-pin rewrite,
      # publishing a dependent before its dependency leaves the
      # dependent pointing at a version that doesn't yet exist on npm.
      # If a dependency publish then stalls or fails, installs of the
      # already-published release fail.
      #
      # Order is verified in the step above. To add a package, update
      # both the order array there AND the array here — the verifier
      # will catch divergence.
      #
      # 17 packages today; an explicit list stays reviewable up to ~25.
      # Past that, factor into a shared JSON file both steps read.
      #
      # Failures are NOT swallowed. If any single publish fails, the
      # workflow exits non-zero so the maintainer sees a red release.
      - name: Publish in dependency order
        run: |
          set -euo pipefail

          PUBLISH_ORDER=(
            packages/core
            packages/event-log
            packages/action-kernel
            packages/memory-firewall
            packages/cognitive-core
            packages/trace
            packages/adapters/filesystem
            packages/adapters/git
            packages/memory-firewall/adapters/mem0
            packages/memory-firewall/adapters/letta
            packages/memory-firewall/adapters/zep
            # guard depends on policy-kernel (re-exports autoApprovePolicy).
            packages/policy-kernel
            packages/guard
            # First publish of guard-mcp requires the manual
            # bootstrap (one `npm publish` + trusted-publisher rule
            # configured on npm) before this stage-publish step can
            # succeed — see docs/roadmap.md "Batch 3 follow-ups."
            packages/guard-mcp
            # cli depends on harness (`lodestar harness run`/`list`).
            packages/harness
            # viewer is a CLI dependency; publishes before `cli`. Like
            # guard-mcp, its first publish needs the manual bootstrap.
            packages/viewer
            packages/cli
          )

          for pkg in "${PUBLISH_ORDER[@]}"; do
            name=$(node -p "require('./$pkg/package.json').name")
            echo "::group::stage-publish $name"
            # `npm stage publish` (npm 11+) uploads to npm's staging area
            # under the configured trusted-publisher rule. Each stage upload
            # waits for manual 2FA approval in the npm UI before going live.
            (cd "$pkg" && npm stage publish --provenance --access public)
            echo "::endgroup::"
          done
