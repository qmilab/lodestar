name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres service for the memory-firewall store integration tests. The
    # suite is gated on LODESTAR_TEST_DATABASE_URL (set on the Test step below);
    # without it the Postgres tests skip, so this service is what actually
    # exercises the cross-session store path in CI.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lodestar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The probe-runner OS sandbox (#114/#121, ADR-0023) uses bubblewrap on
      # Linux. Installing it here is what makes the sandbox unit tests and the
      # `runner-sandboxes-probe-filesystem-and-network` probe exercise the real
      # filesystem/network containment in CI; without it they skip loudly.
      - name: Install bubblewrap (probe-runner OS sandbox)
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          # GitHub's Ubuntu 24.04 runners restrict unprivileged user namespaces
          # via AppArmor, which bubblewrap requires; re-enable so the OS sandbox
          # is actually FUNCTIONAL here (else detectSandboxMechanism reports none
          # and the sandbox tests skip instead of validating). `|| true` tolerates
          # older runners where the sysctl does not exist.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      # Lint is independent of the build (biome is standalone), so run it
      # first for the fastest feedback on style regressions.
      - name: Lint
        run: bun run lint

      # Build first so TypeScript project references resolve cross-package
      # types before typecheck and the probes (which import from dist/).
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          LODESTAR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lodestar_test

      # The same Postgres service backs the cross-session probe
      # (`tool-poisoning-cross-session`), which skips loudly when the var
      # is unset. Setting it here is what exercises the real cross-session
      # provenance path; without it the probe would skip in CI too.
      - name: Run probes
        run: bun run probes:ci
        env:
          LODESTAR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lodestar_test

      # Validate the OS sandbox (#121, ADR-0023) under REAL bubblewrap natively
      # (the runner is Linux with bwrap installed above): a sandboxed probe must
      # not read host files outside its read-root allowlist — including trees
      # under the broad runtime prefixes /opt and /usr/src that the narrowed binds
      # must not expose. Locks the round-8 read-confinement boundary in CI.
      - name: Validate OS sandbox (bubblewrap)
        run: bash scripts/validate-linux-sandbox.sh
        env:
          LODESTAR_SANDBOX_NATIVE: "1"

  # LangGraph runtime adapter (ADR-0024) — the one job that installs Python +
  # LangGraph + the `lodestar-langgraph` hook so the runtime-gated
  # `langgraph-tool-calls-are-governed` probe exercises its REAL end-to-end path
  # (a real LangGraph compiled graph + ToolNode → the hook → the TS gate). In the
  # `verify` job above that probe runs under `probes:ci` but skips loudly (no
  # LangGraph there), mirroring the DB-gated cross-session probe.
  langgraph-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the shared RPC client (lodestar-runtime-client, #128 / ADR-0028)
      # from its local path FIRST — the hook pins it `==<version>` and it is not
      # yet on PyPI in this job — then the hook itself (with its langgraph extra),
      # so the probe exercises the packaged artifact, not just the in-repo source.
      - name: Install the LangGraph runtime hook + LangGraph
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./runtimes/runtime-client "./runtimes/langgraph[langgraph]"

      # The probe spawns `bun run …/cli runtime gate` (bun is on PATH from
      # setup-bun) and drives a real LangGraph loop through it.
      - name: Run the LangGraph runtime adapter probe (real path)
        run: bun run packs/lodestar-core/probes/langgraph-tool-calls-are-governed.ts
        env:
          LODESTAR_PYTHON: python

  # CrewAI runtime adapter (ADR-0026) — the sibling of langgraph-runtime: installs
  # Python + CrewAI + the `lodestar-crewai` hook so the runtime-gated
  # `crewai-tool-calls-are-governed` probe exercises its REAL end-to-end path (real
  # CrewAI tools → the hook → the shared TS gate). In the `verify` job above that
  # probe runs under `probes:ci` but skips loudly (no CrewAI there), mirroring the
  # DB-gated cross-session probe.
  crewai-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # CrewAI pulls chromadb, whose pydantic.v1 BaseSettings is incompatible with
      # Python 3.14, so pin 3.12 (the hook itself supports 3.10+).
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the shared RPC client (lodestar-runtime-client, #128 / ADR-0028)
      # from its local path FIRST — the hook pins it `==<version>` and it is not
      # yet on PyPI in this job — then the hook itself (with its crewai extra), so
      # the probe exercises the packaged artifact, not just the in-repo source.
      - name: Install the CrewAI runtime hook + CrewAI
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./runtimes/runtime-client "./runtimes/crewai[crewai]"

      # The probe spawns `bun run …/cli runtime gate` (bun is on PATH from
      # setup-bun) and drives real CrewAI tools through it.
      - name: Run the CrewAI runtime adapter probe (real path)
        run: bun run packs/lodestar-core/probes/crewai-tool-calls-are-governed.ts
        env:
          LODESTAR_PYTHON: python

  # AutoGen runtime adapter (ADR-0027) — the third sibling: installs Python +
  # AutoGen + the `lodestar-autogen` hook so the runtime-gated
  # `autogen-tool-calls-are-governed` probe exercises its REAL end-to-end path (real
  # AutoGen tools → the hook → the shared TS gate). In the `verify` job above that
  # probe runs under `probes:ci` but skips loudly (no AutoGen there), mirroring the
  # DB-gated cross-session probe.
  autogen-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # AutoGen (unlike CrewAI) does not pull chromadb, so it has no 3.14
      # constraint; pin 3.12 anyway to match the sibling runtime jobs.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the shared RPC client (lodestar-runtime-client, #128 / ADR-0028)
      # from its local path FIRST — the hook pins it `==<version>` and it is not
      # yet on PyPI in this job — then the hook itself (with its autogen extra), so
      # the probe exercises the packaged artifact, not just the in-repo source.
      - name: Install the AutoGen runtime hook + AutoGen
        run: |
          python -m pip install --upgrade pip
          python -m pip install ./runtimes/runtime-client "./runtimes/autogen[autogen]"

      # The probe spawns `bun run …/cli runtime gate` (bun is on PATH from
      # setup-bun) and drives real AutoGen tools through it.
      - name: Run the AutoGen runtime adapter probe (real path)
        run: bun run packs/lodestar-core/probes/autogen-tool-calls-are-governed.ts
        env:
          LODESTAR_PYTHON: python

  # License audit — fail the build if any dependency anywhere in the tree
  # (transitive and dev included) carries a non-permissive license. This is
  # independent of the build, so it runs as its own job for fast feedback
  # and to keep the legal posture green without waiting on Postgres/probes.
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The allowlist is the permissive set Lodestar accepts: MIT, Apache-2.0,
      # ISC, the BSD family, 0BSD, CC0-1.0, Unlicense, and BlueOak-1.0.0.
      # `--onlyAllow` matches the SPDX string exactly, so composite
      # expressions actually present in the tree (e.g. "MIT OR Apache-2.0")
      # are listed explicitly. Any copyleft (GPL/LGPL/AGPL/MPL/EPL/CDDL)
      # license is absent from this set and therefore fails the job.
      # Private workspace packages (the @qmilab/lodestar-* sources) are
      # excluded — they are Apache-2.0 by the root LICENSE, not separately
      # tagged.
      - name: Audit dependency licenses
        run: |
          bunx --bun license-checker-rseidelsohn \
            --onlyAllow 'MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;BSD;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;MIT OR Apache-2.0;(MIT OR Apache-2.0)' \
            --excludePrivatePackages \
            --summary
