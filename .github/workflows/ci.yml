name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint is independent of the build (biome is standalone), so run it
      # first for the fastest feedback on style regressions.
      - name: Lint
        run: bun run lint

      # Build first so TypeScript project references resolve cross-package
      # types before typecheck and the probes (which import from dist/).
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Run probes
        run: bun run probes:all
