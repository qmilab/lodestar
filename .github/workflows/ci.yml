name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres service for the memory-firewall store integration tests. The
    # suite is gated on LODESTAR_TEST_DATABASE_URL (set on the Test step below);
    # without it the Postgres tests skip, so this service is what actually
    # exercises the cross-session store path in CI.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lodestar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint is independent of the build (biome is standalone), so run it
      # first for the fastest feedback on style regressions.
      - name: Lint
        run: bun run lint

      # Build first so TypeScript project references resolve cross-package
      # types before typecheck and the probes (which import from dist/).
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          LODESTAR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lodestar_test

      # The same Postgres service backs the cross-session probe
      # (`tool-poisoning-cross-session`), which skips loudly when the var
      # is unset. Setting it here is what exercises the real cross-session
      # provenance path; without it the probe would skip in CI too.
      - name: Run probes
        run: bun run probes:ci
        env:
          LODESTAR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lodestar_test

  # License audit — fail the build if any dependency anywhere in the tree
  # (transitive and dev included) carries a non-permissive license. This is
  # independent of the build, so it runs as its own job for fast feedback
  # and to keep the legal posture green without waiting on Postgres/probes.
  license-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The allowlist is the permissive set Lodestar accepts: MIT, Apache-2.0,
      # ISC, the BSD family, 0BSD, CC0-1.0, Unlicense, and BlueOak-1.0.0.
      # `--onlyAllow` matches the SPDX string exactly, so composite
      # expressions actually present in the tree (e.g. "MIT OR Apache-2.0")
      # are listed explicitly. Any copyleft (GPL/LGPL/AGPL/MPL/EPL/CDDL)
      # license is absent from this set and therefore fails the job.
      # Private workspace packages (the @qmilab/lodestar-* sources) are
      # excluded — they are Apache-2.0 by the root LICENSE, not separately
      # tagged.
      - name: Audit dependency licenses
        run: |
          bunx --bun license-checker-rseidelsohn \
            --onlyAllow 'MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;BSD;0BSD;CC0-1.0;Unlicense;BlueOak-1.0.0;MIT OR Apache-2.0;(MIT OR Apache-2.0)' \
            --excludePrivatePackages \
            --summary
