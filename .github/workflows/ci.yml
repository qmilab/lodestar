name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres service for the memory-firewall store integration tests. The
    # suite is gated on LODESTAR_TEST_DATABASE_URL (set on the Test step below);
    # without it the Postgres tests skip, so this service is what actually
    # exercises the cross-session store path in CI.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lodestar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint is independent of the build (biome is standalone), so run it
      # first for the fastest feedback on style regressions.
      - name: Lint
        run: bun run lint

      # Build first so TypeScript project references resolve cross-package
      # types before typecheck and the probes (which import from dist/).
      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          LODESTAR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lodestar_test

      # The same Postgres service backs the cross-session probe
      # (`tool-poisoning-cross-session`), which skips loudly when the var
      # is unset. Setting it here is what exercises the real cross-session
      # provenance path; without it the probe would skip in CI too.
      - name: Run probes
        run: bun run probes:ci
        env:
          LODESTAR_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lodestar_test
