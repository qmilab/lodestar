name: Publish to PyPI

# Publishes the Python runtime hooks (runtimes/*) to PyPI via OIDC **trusted
# publishing** — no long-lived tokens, mirroring the npm side (publish.yml).
#
# Cadence (ADR-0028): Python rides the SAME `v*` tag as npm — one version line
# across the whole repo, every package bumped together at release. The guard job
# below fails the release if any Python version (or the hooks' shared-client pin)
# is out of step with the tag, mirroring publish.yml's "Verify package versions
# match the release tag" step.
#
# Publish order (ADR-0028): the shared `lodestar-runtime-client` publishes FIRST;
# the three hooks pin `lodestar-runtime-client==<version>`, so a hook landing on
# PyPI before its client would point at a version that does not yet exist. This is
# the Python analogue of publish.yml's PUBLISH_ORDER.
#
# FIRST-PUBLISH BOOTSTRAP (one-time, per project, before the first release tag):
# register a PyPI "pending publisher" at https://pypi.org/manage/account/publishing/
# for each of the four projects —
#   lodestar-runtime-client, lodestar-langgraph, lodestar-crewai, lodestar-autogen
# each with:  Owner = qmilab,  Repository = lodestar,
#             Workflow = publish-pypi.yml,  Environment = pypi
# The first run then creates the project. This is the PyPI analogue of the npm
# new-name trusted-publisher bootstrap.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for trusted publishing OIDC

jobs:
  # Fail fast — before any build/publish — if the four Python package versions,
  # their __init__ __version__, or the three hooks' shared-client pins are not all
  # equal to the release tag. Keeps a half-published Python release from happening,
  # exactly like publish.yml's pre-publish version guard for npm.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # tomllib is stdlib on 3.11+
      - name: Verify Python package versions match the release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python <<'EOF'
          import os, re, sys, tomllib, pathlib

          tag = os.environ["TAG"][1:]  # strip leading 'v'
          print(f"Release tag implies version: {tag}")

          CLIENT = "lodestar-runtime-client"
          # dir -> (package module dir, depends on the shared client?)
          pkgs = {
              "runtimes/runtime-client": ("lodestar_runtime_client", False),
              "runtimes/langgraph": ("lodestar_langgraph", True),
              "runtimes/crewai": ("lodestar_crewai", True),
              "runtimes/autogen": ("lodestar_autogen", True),
          }

          errors = []
          for d, (mod, needs_client) in pkgs.items():
              data = tomllib.loads(pathlib.Path(d, "pyproject.toml").read_text())
              name = data["project"]["name"]
              ver = data["project"]["version"]
              if ver != tag:
                  errors.append(f"{name}: pyproject version {ver} != tag {tag}")
              else:
                  print(f"ok: {name} pyproject @ {ver}")

              init = pathlib.Path(d, mod, "__init__.py").read_text()
              m = re.search(r'__version__\s*=\s*"([^"]+)"', init)
              got = m.group(1) if m else None
              if got != tag:
                  errors.append(f"{name}: __init__ __version__ {got} != tag {tag}")
              else:
                  print(f"ok: {name} __version__ @ {got}")

              if needs_client:
                  deps = data["project"].get("dependencies", [])
                  pin = next((x for x in deps if x.replace(" ", "").startswith(CLIENT)), None)
                  want = f"{CLIENT}=={tag}"
                  if (pin or "").replace(" ", "") != want:
                      errors.append(f"{name}: shared-client pin '{pin}' != '{want}'")
                  else:
                      print(f"ok: {name} pins {want}")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print("ok: all Python packages aligned with the tag")
          EOF

  # The shared client publishes first (the hooks pin it exactly).
  publish-client:
    needs: guard
    runs-on: ubuntu-latest
    environment: pypi   # matches the trusted-publisher config on PyPI
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build runtimes/runtime-client
      - name: Publish lodestar-runtime-client
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: runtimes/runtime-client/dist/
          # Idempotent: a re-run after a partial failure (or a version already live)
          # skips instead of erroring on "file already exists", like the npm side's
          # `npm view` live-skip.
          skip-existing: true

  # The three hooks publish after the client they depend on. Each is a separate
  # PyPI project with its own trusted-publisher rule pointing at this workflow +
  # the `pypi` environment; the matrix runs them in parallel on isolated runners.
  publish-hooks:
    needs: publish-client
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        hook: [langgraph, crewai, autogen]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build runtimes/${{ matrix.hook }}
      - name: Publish lodestar-${{ matrix.hook }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: runtimes/${{ matrix.hook }}/dist/
          skip-existing: true
