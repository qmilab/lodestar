name: docs

# Builds the MkDocs site and deploys it to GitHub Pages. Because the org Pages
# site (qmilab.github.io) uses the custom apex domain qmilab.com, this project
# site is served at qmilab.com/lodestar/ — and building into _site/docs lands it
# at qmilab.com/lodestar/docs/. Do NOT set a custom domain (CNAME) on this repo's
# Pages, or it would override the inherited apex.
#
# This repo's Pages owns the whole /lodestar/* path (a project site takes
# precedence over the org site for its prefix), so the landing page at
# /lodestar/ must also ship from here: landing/. is copied into the artifact
# root (_site/) alongside _site/docs/. See landing/README.md.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'landing/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs build --site-dir _site/docs
      # Land the landing page at the /lodestar/ root, next to /lodestar/docs/.
      # README.md is a maintainer note, not a published asset — drop it.
      - run: |
          cp -r landing/. _site/
          rm -f _site/README.md
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
